name: Build Preview

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install Wix CLI
      run: npm install -g @wix/cli@1.1.174

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Build Preview
      env:
        WIX_AUTH_TOKEN: ${{ secrets.WIX_AUTH_TOKEN }}
      run: wix preview --source local
